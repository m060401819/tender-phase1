services:
  postgres:
    image: postgres:16-alpine
    container_name: tender_phase1_postgres
    environment:
      POSTGRES_DB: tender_phase1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tender_phase1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tender_phase1_app
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tender_phase1
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
